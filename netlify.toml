[build]
  base = "web"
  publish = "dist"
  command = "bun install --frozen-lockfile && bun run build"

[build.environment]
  BUN_VERSION = "1.3.11"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
